<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <rect width="900" height="480" fill="#ffffff"/>

  <text x="40" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#24476f">
    Exemplo de Euler-Maruyama
  </text>

  <text x="40" y="72" font-family="Arial, sans-serif" font-size="15" fill="#555555">
    Algumas trajetorias simuladas para o mesmo processo estocastico
  </text>

  <line x1="80" y1="390" x2="830" y2="390" stroke="#333333" stroke-width="2"/>
  <line x1="80" y1="390" x2="80" y2="105" stroke="#333333" stroke-width="2"/>

  <g stroke="#dddddd" stroke-width="1">
    <line x1="80" y1="320" x2="830" y2="320"/>
    <line x1="80" y1="250" x2="830" y2="250"/>
    <line x1="80" y1="180" x2="830" y2="180"/>
    <line x1="205" y1="105" x2="205" y2="390"/>
    <line x1="330" y1="105" x2="330" y2="390"/>
    <line x1="455" y1="105" x2="455" y2="390"/>
    <line x1="580" y1="105" x2="580" y2="390"/>
    <line x1="705" y1="105" x2="705" y2="390"/>
  </g>

  <text x="810" y="425" font-family="Arial, sans-serif" font-size="14" fill="#333333">tempo</text>
  <text x="28" y="112" font-family="Arial, sans-serif" font-size="14" fill="#333333">X(t)</text>

  <path d="M80 280 L205 270 L330 260 L455 248 L580 238 L705 226 L830 215"
        fill="none" stroke="#444444" stroke-width="3" stroke-dasharray="8 7"/>

  <path d="M80 280 L205 260 L330 290 L455 230 L580 245 L705 190 L830 170"
        fill="none" stroke="#1f77b4" stroke-width="4"/>

  <path d="M80 280 L205 300 L330 275 L455 320 L580 300 L705 335 L830 315"
        fill="none" stroke="#2ca02c" stroke-width="4"/>

  <path d="M80 280 L205 250 L330 235 L455 260 L580 210 L705 200 L830 150"
        fill="none" stroke="#d62728" stroke-width="4"/>

  <g fill="#ffffff" stroke="#333333" stroke-width="2">
    <circle cx="80" cy="280" r="5"/>
    <circle cx="205" cy="260" r="5"/>
    <circle cx="330" cy="290" r="5"/>
    <circle cx="455" cy="230" r="5"/>
    <circle cx="580" cy="245" r="5"/>
    <circle cx="705" cy="190" r="5"/>
    <circle cx="830" cy="170" r="5"/>
  </g>

  <line x1="115" y1="435" x2="165" y2="435" stroke="#1f77b4" stroke-width="4"/>
  <text x="175" y="440" font-family="Arial, sans-serif" font-size="14" fill="#333333">trajetorias simuladas</text>

  <line x1="390" y1="435" x2="440" y2="435" stroke="#444444" stroke-width="3" stroke-dasharray="8 7"/>
  <text x="450" y="440" font-family="Arial, sans-serif" font-size="14" fill="#333333">tendencia media</text>
</svg>
